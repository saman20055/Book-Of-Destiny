<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050302">
<title>The Book of Destiny</title>
<style>
:root{
  --gold:#f2c463;
  --gold2:#9f6517;
  --paper:#d9ae67;
  --ink:#2c1508;
  --ui:#080503;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;background:#020101;
  font-family:Georgia,"Times New Roman",serif;touch-action:manipulation;
}
button,input{font:inherit}
#app{
  position:relative;width:100vw;height:100dvh;overflow:hidden;isolation:isolate;
  background:
    radial-gradient(circle at 50% 52%,rgba(123,58,19,.24),transparent 43%),
    linear-gradient(#080503 0%,#130906 45%,#030202 100%);
}
#room{
  position:absolute;inset:0;overflow:hidden;
  background:
    radial-gradient(circle at 15% 46%,rgba(255,103,24,.23),transparent 21%),
    radial-gradient(circle at 85% 34%,rgba(242,157,55,.12),transparent 15%),
    repeating-linear-gradient(90deg,rgba(255,255,255,.018) 0 2px,transparent 2px 105px);
}
#room::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 34%,rgba(0,0,0,.78) 100%);
  pointer-events:none;
}
.shelf{
  position:absolute;top:13%;width:24%;height:53%;opacity:.46;
  background:
    repeating-linear-gradient(0deg,#0b0604 0 9%,#2b160d 9% 11%),
    repeating-linear-gradient(90deg,#30170d 0 8%,#180b07 8% 13%);
  border:8px solid #120905;box-shadow:inset 0 0 35px #000;
}
.shelf.left{left:-4%;transform:perspective(500px) rotateY(12deg)}
.shelf.right{right:-4%;transform:perspective(500px) rotateY(-12deg)}
.fireplace{
  position:absolute;left:2.5%;top:38%;width:24%;height:31%;
  border:14px solid #27140c;border-bottom:0;border-radius:48% 48% 0 0;
  background:radial-gradient(ellipse at 50% 95%,#ffdf75 0 8%,#f87520 9% 20%,#761b09 30%,#100503 67%);
  box-shadow:0 0 75px rgba(255,92,21,.28),inset 0 0 30px #000;
}
.flame,.flame::before,.flame::after{
  position:absolute;content:"";bottom:8%;left:42%;width:17%;height:42%;
  background:linear-gradient(#fff8a6,#ff9b28 48%,#a9200a);
  border-radius:50% 50% 42% 42%;filter:blur(1px);
  transform-origin:50% 100%;animation:flicker .55s ease-in-out infinite alternate;
}
.flame::before{left:-90%;bottom:-2%;width:110%;height:78%;animation-delay:-.2s}
.flame::after{left:78%;bottom:-4%;width:90%;height:72%;animation-delay:-.35s}
@keyframes flicker{from{transform:rotate(-4deg) scale(.9);opacity:.72}to{transform:rotate(5deg) scale(1.08);opacity:1}}

.header{
  position:absolute;z-index:8;left:5%;right:5%;top:max(2.5%,env(safe-area-inset-top));
  text-align:center;text-shadow:0 3px 12px #000,0 0 28px #000;
}
.header h1{
  margin:0;color:var(--gold);font-size:clamp(31px,8.4vw,78px);
  line-height:.93;letter-spacing:.035em;
}
.header p{
  margin:12px auto 0;max-width:760px;color:#fff1cd;
  font-size:clamp(14px,3.4vw,26px);line-height:1.22;
}

.desk{
  position:absolute;left:0;right:0;bottom:0;height:24%;
  background:
    repeating-linear-gradient(90deg,#261107 0 55px,#4b2510 58px 105px,#1e0d06 108px 165px);
  border-top:9px solid #130704;box-shadow:0 -22px 70px rgba(0,0,0,.8);
}
.stage{
  position:absolute;z-index:5;left:50%;top:55%;width:min(94vw,880px);
  aspect-ratio:1.5;transform:translate(-50%,-50%);
  filter:drop-shadow(0 28px 25px rgba(0,0,0,.82));
  perspective:1200px;
}
.book{
  position:absolute;inset:0;display:flex;transform:rotateX(9deg);
}
.cover{
  position:absolute;inset:3% 0 -5%;border-radius:8% 8% 10% 10%;
  background:linear-gradient(100deg,#2b1207,#6d3517 48%,#321608);
  border:8px solid #160803;box-shadow:inset 0 0 38px #090301;
}
.page{
  position:relative;z-index:2;width:50%;height:94%;top:1%;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 42%,rgba(255,241,184,.82),transparent 44%),
    repeating-linear-gradient(0deg,rgba(99,51,15,.018) 0 1px,transparent 1px 4px),
    linear-gradient(100deg,#aa7136,#e5bd76 16%,#e4bc74 84%,#9c622e);
  border:5px solid #5c3215;
  box-shadow:inset 0 0 25px rgba(65,29,8,.38);
}
.page.left{border-radius:8% 1% 3% 10%;transform:rotateY(5deg);transform-origin:right}
.page.right{border-radius:1% 8% 10% 3%;transform:rotateY(-5deg);transform-origin:left}
.page::before{
  content:"";position:absolute;inset:6%;
  border:2px solid rgba(72,35,11,.48);border-radius:3%;
  box-shadow:inset 0 0 0 5px rgba(133,76,25,.12);
}
.ornament{
  position:absolute;color:rgba(70,31,7,.48);font-size:clamp(22px,5vw,56px);
}
.ornament.tl{left:8%;top:7%}.ornament.br{right:8%;bottom:8%;transform:rotate(180deg)}
.left-copy{
  position:absolute;left:14%;right:14%;top:35%;text-align:center;
  color:#4d250c;font-style:italic;font-weight:bold;
  font-size:clamp(14px,3.2vw,31px);line-height:1.25;
}
.writing-area{
  position:absolute;z-index:6;left:55%;top:34%;width:38%;height:34%;
  transform:rotate(-1.2deg);display:flex;align-items:center;justify-content:center;
}
#nameSvg{width:100%;height:100%;overflow:visible}
#nameText{
  fill:var(--ink);font-family:"Snell Roundhand","Brush Script MT","Segoe Script",cursive;
  text-anchor:middle;dominant-baseline:middle;
  font-size:66px;font-style:italic;
  stroke:var(--ink);stroke-width:.7;
  paint-order:stroke fill;
  opacity:0;
}
#nameText.writing{
  opacity:1;
  stroke-dasharray:1500;
  stroke-dashoffset:1500;
  animation:inkDraw var(--writeTime,2.8s) linear forwards,inkGlow .65s ease-out var(--writeTime,2.8s);
}
@keyframes inkDraw{to{stroke-dashoffset:0}}
@keyframes inkGlow{0%{filter:none}45%{filter:drop-shadow(0 0 9px #ffd56c)}100%{filter:none}}

#quill{
  position:absolute;z-index:10;left:68%;top:42%;
  width:clamp(62px,12vw,145px);height:clamp(125px,24vw,290px);
  transform:translate(-50%,-50%) rotate(19deg);
  transform-origin:58% 88%;filter:drop-shadow(0 9px 6px rgba(0,0,0,.65));
  opacity:.95;
}
#quill.writing{animation:quillWrite var(--writeTime,2.8s) ease-in-out forwards}
@keyframes quillWrite{
  0%{left:57%;top:46%;transform:translate(-50%,-50%) rotate(15deg)}
  12%{left:57%;top:46%;transform:translate(-50%,-50%) rotate(22deg)}
  25%{top:47%}
  50%{top:45.8%}
  75%{top:47.2%}
  100%{left:88%;top:46%;transform:translate(-50%,-50%) rotate(19deg)}
}
.quill-feather{
  position:absolute;left:26%;top:0;width:49%;height:78%;
  background:linear-gradient(100deg,#0a0807 2%,#3d2b1e 28%,#0e0b09 55%,#9a6a33 72%,#120e0a);
  clip-path:polygon(47% 0,66% 12%,77% 35%,66% 67%,48% 100%,36% 69%,16% 48%,25% 22%);
}
.quill-feather::after{
  content:"";position:absolute;left:49%;top:5%;width:3%;height:92%;
  background:#d5a65b;transform:rotate(-3deg);
}
.quill-shaft{
  position:absolute;left:49%;top:68%;width:6%;height:34%;
  background:linear-gradient(90deg,#6c411b,#f0c36a,#633b18);
  transform:rotate(4deg);border-radius:50%;
}
.quill-tip{
  position:absolute;left:46%;bottom:-2%;width:14%;height:12%;
  background:#c49343;clip-path:polygon(50% 100%,0 0,100% 0);
}
.spark{
  position:absolute;z-index:11;width:7px;height:7px;border-radius:50%;
  background:#fffbd0;box-shadow:0 0 8px #ffe16d,0 0 20px #ff8a20;
  opacity:0;pointer-events:none;
}
.spark.go{animation:sparkMove var(--writeTime,2.8s) linear forwards}
@keyframes sparkMove{
  0%{left:57%;top:51%;opacity:0}
  8%{opacity:1}
  92%{opacity:1}
  100%{left:88%;top:51%;opacity:0}
}

.page-turn{
  position:absolute;z-index:12;left:50%;top:1%;width:50%;height:94%;
  transform-origin:left center;transform:rotateY(90deg);
  border-radius:1% 8% 10% 3%;
  background:linear-gradient(100deg,#9f632f,#e2b872 20%,#d7a85d 86%,#7c421d);
  border:5px solid #5c3215;box-shadow:inset 0 0 25px rgba(60,25,6,.35);
  opacity:0;pointer-events:none;
}
.page-turn.turning{animation:pageTurn 1.15s cubic-bezier(.4,.05,.2,1) forwards}
@keyframes pageTurn{
  0%{opacity:1;transform:rotateY(0)}
  48%{box-shadow:-24px 8px 28px rgba(0,0,0,.42);transform:rotateY(-88deg)}
  100%{opacity:1;transform:rotateY(-180deg)}
}

#particles{position:absolute;inset:0;z-index:7;pointer-events:none}

#panel{
  position:absolute;z-index:30;left:50%;bottom:max(3%,env(safe-area-inset-bottom));
  transform:translateX(-50%);width:min(92%,690px);
  display:flex;gap:8px;padding:10px;border-radius:16px;
  background:rgba(4,2,1,.93);border:1px solid rgba(242,196,99,.72);
  backdrop-filter:blur(9px);box-shadow:0 12px 35px rgba(0,0,0,.62);
}
#panel.hidden{display:none}
#viewerName,#writeBtn,#liveBtn{
  height:50px;border:0;border-radius:10px;font-size:17px;
}
#viewerName{flex:1;min-width:0;padding:0 14px;background:#fff0cb;color:#241004}
#writeBtn,#liveBtn{
  padding:0 15px;color:#fff7dd;font-weight:bold;
  background:linear-gradient(#d5a23b,#85530f);
}
#liveBtn{background:linear-gradient(#8f2518,#50100b)}
#status{
  position:absolute;z-index:31;left:50%;bottom:1%;transform:translateX(-50%);
  color:rgba(255,255,255,.55);font:11px Arial,sans-serif;white-space:nowrap;
}
#status.hidden{display:none}
#secretCorner{
  position:absolute;z-index:40;right:0;bottom:0;width:82px;height:82px;background:transparent;
}
.live-badge{
  position:absolute;z-index:9;left:4%;top:3%;padding:7px 11px;border-radius:7px;
  color:white;background:#d4232d;font:bold 14px Arial,sans-serif;opacity:0;
}
.live-badge.show{opacity:1}

@media(max-width:600px){
  .stage{top:56%;width:97vw}
  .header{top:3.5%}
  .header p{margin-top:8px}
  #panel{bottom:2.5%;padding:8px}
  #viewerName,#writeBtn,#liveBtn{height:46px;font-size:15px}
}
@media(orientation:landscape){
  #app{width:56.25vh;height:100dvh;margin:auto}
}
</style>
</head>
<body>
<div id="app" tabindex="0">
  <div id="room">
    <div class="shelf left"></div>
    <div class="shelf right"></div>
    <div class="fireplace"><div class="flame"></div></div>
  </div>

  <div class="live-badge" id="liveBadge">LIVE MODE</div>

  <header class="header">
    <h1>THE BOOK OF DESTINY</h1>
    <p>Comment your name. The book chooses who is remembered.</p>
  </header>

  <div class="stage">
    <div class="book">
      <div class="cover"></div>
      <div class="page left">
        <span class="ornament tl">❦</span>
        <span class="ornament br">❦</span>
        <div class="left-copy">Every name written here<br>becomes part of legend…</div>
      </div>
      <div class="page right">
        <span class="ornament tl">❦</span>
        <span class="ornament br">❦</span>
      </div>
      <div class="page-turn" id="pageTurn"></div>
    </div>

    <div class="writing-area">
      <svg id="nameSvg" viewBox="0 0 500 150" aria-hidden="true">
        <text id="nameText" x="250" y="78"></text>
      </svg>
    </div>

    <div id="quill" aria-hidden="true">
      <div class="quill-feather"></div>
      <div class="quill-shaft"></div>
      <div class="quill-tip"></div>
    </div>
    <div class="spark" id="spark"></div>
  </div>

  <canvas id="particles"></canvas>
  <div class="desk"></div>

  <div id="panel">
    <input id="viewerName" maxlength="30" placeholder="Type a viewer's name" autocomplete="off">
    <button id="writeBtn">WRITE</button>
    <button id="liveBtn">START LIVE</button>
  </div>

  <div id="status">Test first, then press START LIVE before screen sharing</div>
  <div id="secretCorner" aria-hidden="true"></div>
</div>

<script>
(() => {
  const app = document.getElementById("app");
  const panel = document.getElementById("panel");
  const status = document.getElementById("status");
  const input = document.getElementById("viewerName");
  const nameText = document.getElementById("nameText");
  const quill = document.getElementById("quill");
  const spark = document.getElementById("spark");
  const pageTurn = document.getElementById("pageTurn");
  const liveBadge = document.getElementById("liveBadge");
  const secretCorner = document.getElementById("secretCorner");
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");

  let busy = false;
  let liveMode = false;
  let hiddenBuffer = "";
  let tapCount = 0;
  let tapTimer = null;
  let particles = [];

  function resizeCanvas(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = innerWidth * dpr;
    canvas.height = innerHeight * dpr;
    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resizeCanvas();
  addEventListener("resize", resizeCanvas);

  function fitName(text){
    const len = [...text].length;
    let size = 66;
    if(len > 9) size = 58;
    if(len > 13) size = 48;
    if(len > 18) size = 38;
    if(len > 24) size = 31;
    nameText.style.fontSize = size + "px";
    const seconds = Math.max(2.2, Math.min(4.8, 1.7 + len * .16));
    document.documentElement.style.setProperty("--writeTime", seconds + "s");
    return seconds;
  }

  function spawnParticles(){
    const rect = app.getBoundingClientRect();
    for(let i=0;i<38;i++){
      particles.push({
        x:rect.width*.68 + (Math.random()-.5)*130,
        y:rect.height*.51 + (Math.random()-.5)*70,
        vx:(Math.random()-.5)*1.7,
        vy:-.5-Math.random()*1.7,
        life:35+Math.random()*45,
        r:1+Math.random()*2.6
      });
    }
  }

  function drawParticles(){
    ctx.clearRect(0,0,innerWidth,innerHeight);
    particles = particles.filter(p => p.life > 0);
    for(const p of particles){
      p.x += p.vx; p.y += p.vy; p.life--;
      const a = Math.max(0,p.life/70);
      ctx.beginPath();
      ctx.fillStyle = `rgba(255,205,86,${a})`;
      ctx.shadowBlur = 12;
      ctx.shadowColor = "#ffb52c";
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  function resetAnimations(){
    nameText.classList.remove("writing");
    quill.classList.remove("writing");
    spark.classList.remove("go");
    pageTurn.classList.remove("turning");
    void app.offsetWidth;
  }

  function writeName(raw){
    const clean = String(raw || "").trim().replace(/\s+/g," ").slice(0,30);
    if(!clean || busy) return;

    busy = true;
    hiddenBuffer = "";
    input.value = "";
    resetAnimations();

    nameText.textContent = clean;
    const seconds = fitName(clean);
    nameText.classList.add("writing");
    quill.classList.add("writing");
    spark.classList.add("go");
    spawnParticles();

    const finishMs = seconds * 1000;

    setTimeout(() => {
      spawnParticles();
    }, finishMs - 150);

    setTimeout(() => {
      pageTurn.classList.add("turning");
      spawnParticles();
    }, finishMs + 1850);

    setTimeout(() => {
      nameText.classList.remove("writing");
      nameText.style.opacity = "0";
      pageTurn.classList.remove("turning");
      quill.classList.remove("writing");
      spark.classList.remove("go");
      busy = false;
      if(!liveMode) input.focus();
    }, finishMs + 3100);
  }

  function startLiveMode(){
    liveMode = true;
    panel.classList.add("hidden");
    status.classList.add("hidden");
    liveBadge.classList.add("show");
    input.blur();
    app.focus();
    hiddenBuffer = "";
  }

  function exitLiveMode(){
    liveMode = false;
    panel.classList.remove("hidden");
    status.classList.remove("hidden");
    liveBadge.classList.remove("show");
    hiddenBuffer = "";
    setTimeout(() => input.focus(), 60);
  }

  document.getElementById("writeBtn").addEventListener("click", () => writeName(input.value));
  input.addEventListener("keydown", e => {
    if(e.key === "Enter"){
      e.preventDefault();
      writeName(input.value);
    }
  });
  document.getElementById("liveBtn").addEventListener("click", startLiveMode);

  document.addEventListener("keydown", e => {
    if(!liveMode) return;
    if(e.metaKey || e.ctrlKey || e.altKey) return;

    if(e.key === "Enter"){
      e.preventDefault();
      writeName(hiddenBuffer);
    } else if(e.key === "Backspace"){
      e.preventDefault();
      hiddenBuffer = hiddenBuffer.slice(0,-1);
    } else if(e.key === "Escape"){
      hiddenBuffer = "";
    } else if(e.key.length === 1 && hiddenBuffer.length < 30){
      e.preventDefault();
      hiddenBuffer += e.key;
    }
  }, true);

  secretCorner.addEventListener("pointerup", () => {
    tapCount++;
    clearTimeout(tapTimer);
    tapTimer = setTimeout(() => tapCount = 0, 750);
    if(tapCount >= 3){
      tapCount = 0;
      clearTimeout(tapTimer);
      liveMode ? exitLiveMode() : startLiveMode();
    }
  });

  addEventListener("load", () => input.focus());
})();
</script>
</body>
</html>
