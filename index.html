<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#120a27">
<title>Girls vs Boys — Live Plinko</title>
<style>
:root{
  --pink:#ff3bbf;
  --pink2:#a41cff;
  --blue:#20b9ff;
  --blue2:#335cff;
  --gold:#ffd34f;
  --panel:rgba(13,10,28,.90);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05030c;font-family:Arial,Helvetica,sans-serif}
body{display:grid;place-items:center}
button{font:inherit}
#app{
  position:relative;
  width:min(100vw,56.25dvh);
  height:min(100dvh,177.777vw);
  overflow:hidden;
  background:
    radial-gradient(circle at 20% 20%,rgba(255,58,191,.18),transparent 31%),
    radial-gradient(circle at 82% 28%,rgba(32,185,255,.18),transparent 31%),
    linear-gradient(#281153 0%,#493a66 27%,#7b9870 27.2%,#5d7454 82%,#160c2e 82.2%);
  color:white;
  isolation:isolate;
}
#app::after{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:99;
  box-shadow:inset 0 0 55px rgba(0,0,0,.42);
}
.topbar{
  position:absolute;z-index:15;left:3%;right:3%;top:2.2%;
  display:flex;align-items:center;justify-content:space-between;
  font-weight:800;font-size:clamp(10px,2vw,14px)
}
.live-pill{padding:.35rem .6rem;border-radius:999px;background:#ff295f;box-shadow:0 0 16px rgba(255,41,95,.45)}
.viewers{color:#f6eaff}
.goal{
  position:absolute;z-index:14;left:5%;right:5%;top:7%;
  padding:.65rem .8rem;border-radius:14px;
  background:linear-gradient(180deg,rgba(134,82,255,.94),rgba(77,39,171,.94));
  border:2px solid rgba(255,255,255,.45);
  box-shadow:0 8px 20px rgba(30,10,75,.38),inset 0 0 20px rgba(255,255,255,.08);
}
.goal-head{display:flex;justify-content:space-between;align-items:center;font-weight:900;font-size:clamp(11px,2.4vw,16px)}
.goal-track{margin-top:.45rem;height:11px;border-radius:999px;background:rgba(255,255,255,.25);overflow:hidden}
.goal-fill{height:100%;width:0;background:linear-gradient(90deg,#ffcf48,#fff49c);border-radius:inherit;transition:width .45s ease}
.round{
  position:absolute;z-index:12;left:50%;top:17%;transform:translateX(-50%);
  font-weight:1000;font-style:italic;font-size:clamp(22px,5.3vw,42px);
  text-shadow:0 3px 0 rgba(0,0,0,.38)
}
.teams{
  position:absolute;z-index:12;left:4%;right:4%;top:22%;
  display:flex;justify-content:space-between;pointer-events:none
}
.team{width:42%}
.team.right{text-align:right}
.team-title{
  margin:0;font-weight:1000;font-size:clamp(28px,7vw,56px);
  font-style:italic;line-height:.9;text-shadow:0 4px 0 rgba(0,0,0,.35),0 0 20px currentColor
}
.girls{color:var(--pink)}.boys{color:var(--blue)}
.score{margin-top:.4rem;font-weight:900;font-size:clamp(15px,3.5vw,25px)}
.gift-map{
  margin-top:.65rem;display:inline-grid;gap:.25rem;padding:.35rem .45rem;
  border-radius:8px;background:rgba(255,255,255,.72);color:#151515;
  font-weight:900;font-size:clamp(9px,1.8vw,12px)
}
.board{
  position:absolute;z-index:6;left:3%;right:3%;top:34%;height:45%;
  border-radius:16px 16px 10px 10px;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 20%,rgba(255,255,255,.13),transparent 32%),
    linear-gradient(90deg,rgba(255,59,191,.10),transparent 42%,transparent 58%,rgba(32,185,255,.10)),
    rgba(103,132,91,.34);
  border:2px solid rgba(255,255,255,.16);
  box-shadow:inset 0 0 30px rgba(0,0,0,.23);
}
#game{position:absolute;inset:0;width:100%;height:100%}
.center-line{position:absolute;z-index:5;left:50%;top:0;bottom:0;width:2px;background:rgba(255,255,255,.16)}
.bins{
  position:absolute;z-index:8;left:2%;right:2%;bottom:1%;height:14%;
  display:grid;grid-template-columns:repeat(9,1fr);gap:2px;pointer-events:none
}
.bin{
  display:flex;align-items:center;justify-content:center;
  border-radius:5px 5px 10px 10px;
  font-weight:1000;font-size:clamp(8px,1.7vw,12px);
  background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.15)
}
.bin:nth-child(-n+4){color:#ffd7f4;background:linear-gradient(rgba(255,59,191,.62),rgba(124,18,102,.73))}
.bin:nth-child(5){color:#fff2b0;background:linear-gradient(#f7b62e,#b65b13)}
.bin:nth-child(n+6){color:#d8f5ff;background:linear-gradient(rgba(32,185,255,.62),rgba(25,59,153,.73))}
.feed{
  position:absolute;z-index:14;left:3%;right:3%;top:80.5%;
  height:7%;overflow:hidden;
  padding:.45rem .65rem;border-radius:10px;
  background:rgba(13,8,28,.78);border:1px solid rgba(255,255,255,.12)
}
.feed-line{font-weight:800;font-size:clamp(10px,2.1vw,14px);animation:feedIn .35s ease}
@keyframes feedIn{from{opacity:0;transform:translateY(8px)}}
.footer{
  position:absolute;z-index:16;left:3%;right:3%;bottom:2.3%;
  display:flex;justify-content:center;align-items:center;
  color:#eadcff;font-weight:900;font-size:clamp(10px,2vw,14px)
}
.setup{
  position:absolute;z-index:50;left:3%;right:3%;bottom:8.5%;
  padding:.7rem;border-radius:14px;background:var(--panel);
  border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(9px);
  box-shadow:0 12px 35px rgba(0,0,0,.48)
}
.setup.hidden{display:none}
.setup-title{font-weight:1000;margin-bottom:.5rem}
.btn-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem}
button{
  min-height:42px;border:0;border-radius:9px;color:white;font-weight:900;
  background:#362150;padding:.35rem
}
button.girl-btn{background:linear-gradient(#ff4fc9,#991772)}
button.boy-btn{background:linear-gradient(#31c6ff,#244fcd)}
button.live-btn{background:linear-gradient(#ff355f,#9f1232)}
button.auto-btn{background:linear-gradient(#f2b62d,#a65c0c)}
.secret{position:absolute;z-index:60;right:0;bottom:0;width:78px;height:78px}
.live-mode{
  position:absolute;z-index:25;left:3%;bottom:2.2%;
  padding:.35rem .55rem;border-radius:999px;background:#ff295f;
  font-size:10px;font-weight:900;display:none
}
.live-mode.show{display:block}
.winner{
  position:absolute;z-index:40;inset:0;display:grid;place-items:center;
  background:rgba(6,3,17,.72);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .3s
}
.winner.show{opacity:1}
.winner-card{text-align:center;transform:scale(.8);animation:winnerPop .55s ease forwards}
@keyframes winnerPop{to{transform:scale(1)}}
.winner-card h2{margin:0;font-size:clamp(44px,11vw,90px);font-style:italic}
.winner-card p{font-weight:900;font-size:clamp(18px,4vw,30px)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar"><span class="live-pill">LIVE</span><span class="viewers">👁 <span id="viewers">127</span></span></div>

  <section class="goal">
    <div class="goal-head"><span>🎁 GIFT GOAL</span><span><span id="goalNow">0</span> / <span id="goalMax">5000</span></span></div>
    <div class="goal-track"><div id="goalFill" class="goal-fill"></div></div>
  </section>

  <div class="round">ROUND: <span id="round">1</span></div>

  <section class="teams">
    <div class="team">
      <h2 class="team-title girls">GIRLS</h2>
      <div class="score">SCORE: <span id="girlsScore">0</span></div>
      <div class="gift-map"><span>💬 +1</span><span>🌹 +10</span></div>
    </div>
    <div class="team right">
      <h2 class="team-title boys">BOYS</h2>
      <div class="score">SCORE: <span id="boysScore">0</span></div>
      <div class="gift-map"><span>❤️ +1</span><span>🎁 +10</span></div>
    </div>
  </section>

  <section class="board">
    <canvas id="game"></canvas>
    <div class="center-line"></div>
    <div class="bins">
      <div class="bin">+100</div><div class="bin">+50</div><div class="bin">+25</div><div class="bin">+10</div>
      <div class="bin">×2</div>
      <div class="bin">+10</div><div class="bin">+25</div><div class="bin">+50</div><div class="bin">+100</div>
    </div>
  </section>

  <section id="feed" class="feed"><div class="feed-line">The battle is starting…</div></section>

  <section id="setup" class="setup">
    <div class="setup-title">TEST CONTROLS</div>
    <div class="btn-grid">
      <button class="girl-btn" data-team="girls" data-value="1">GIRL +1</button>
      <button class="girl-btn" data-team="girls" data-value="10">GIRL +10</button>
      <button class="boy-btn" data-team="boys" data-value="1">BOY +1</button>
      <button class="boy-btn" data-team="boys" data-value="10">BOY +10</button>
      <button id="girlBig" class="girl-btn">GIRL +100</button>
      <button id="boyBig" class="boy-btn">BOY +100</button>
      <button id="auto" class="auto-btn">AUTO DEMO</button>
      <button id="startLive" class="live-btn">START LIVE</button>
    </div>
  </section>

  <div id="liveMode" class="live-mode">LIVE MODE</div>
  <div id="secret" class="secret"></div>
  <footer class="footer">GIRLS VS BOYS • GIFTS CONTROL THE GAME</footer>

  <div id="winner" class="winner"><div class="winner-card"><h2 id="winnerTitle"></h2><p id="winnerText"></p></div></div>
</div>

<script>
(()=>{
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),app=document.getElementById("app");
const scoreEls={girls:document.getElementById("girlsScore"),boys:document.getElementById("boysScore")};
const colors={girls:"#ff3bbf",boys:"#20b9ff"};
let W=0,H=0,dpr=1,pegs=[],balls=[],scores={girls:0,boys:0},round=1,goal=0,goalMax=5000;
let live=false,autoTimer=null,taps=0,tapTimer=null,last=performance.now();

function resize(){
  const r=canvas.getBoundingClientRect();dpr=Math.min(devicePixelRatio||1,2);
  canvas.width=r.width*dpr;canvas.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
  W=r.width;H=r.height;buildPegs()
}
function buildPegs(){
  pegs=[];const rows=10,top=H*.08,bottom=H*.78,rowGap=(bottom-top)/(rows-1);
  for(let row=0;row<rows;row++){
    const count=5+row,spacing=W/(count+1),offset=row%2?spacing*.22:0;
    for(let i=0;i<count;i++){
      let x=spacing*(i+1)+offset-spacing*.1;
      if(x>W*.95) x-=spacing*.45;
      pegs.push({x,y:top+row*rowGap,r:3.2})
    }
  }
}
function spawn(team,value=1){
  const count=Math.min(18,Math.max(1,Math.ceil(value/10)));
  const base=Math.max(1,Math.round(value/count));
  for(let i=0;i<count;i++){
    setTimeout(()=>balls.push({
      x:W*(team==="girls"?.42:.58)+(Math.random()-.5)*W*.1,y:-8,
      vx:(Math.random()-.5)*1.3,vy:1+Math.random(),r:6+Math.min(4,value/30),
      team,value:base,alive:true,trail:[]
    }),i*90)
  }
  goal=Math.min(goalMax,goal+value);updateGoal();
  feed(`${team==="girls"?"💗":"💙"} ${team.toUpperCase()} received +${value}`);
}
function physics(b,dt){
  b.vy+=.16*dt;b.x+=b.vx*dt;b.y+=b.vy*dt;
  b.trail.push({x:b.x,y:b.y});if(b.trail.length>7)b.trail.shift();
  for(const p of pegs){
    const dx=b.x-p.x,dy=b.y-p.y,dist=Math.hypot(dx,dy),min=b.r+p.r;
    if(dist<min&&dist>0){
      const nx=dx/dist,ny=dy/dist,over=min-dist;b.x+=nx*over;b.y+=ny*over;
      const dot=b.vx*nx+b.vy*ny;b.vx-=1.75*dot*nx;b.vy-=1.75*dot*ny;
      b.vx+=(Math.random()-.5)*.55;b.vy*=.92
    }
  }
  if(b.x<b.r){b.x=b.r;b.vx=Math.abs(b.vx)*.8}
  if(b.x>W-b.r){b.x=W-b.r;b.vx=-Math.abs(b.vx)*.8}
  if(b.y>H*.86&&b.alive){
    b.alive=false;scoreBall(b)
  }
}
function scoreBall(b){
  const bin=Math.max(0,Math.min(8,Math.floor(b.x/W*9)));
  const mult=[100,50,25,10,2,10,25,50,100][bin];
  const side=bin<4?"girls":bin>4?"boys":b.team;
  const points=bin===4?b.value*2:b.value+mult;
  scores[side]+=points;scoreEls[side].textContent=scores[side].toLocaleString();
  feed(`${side==="girls"?"💗 GIRLS":"💙 BOYS"} scored +${points}`);
  checkWinner()
}
function draw(){
  ctx.clearRect(0,0,W,H);
  for(const p of pegs){
    ctx.beginPath();ctx.fillStyle="rgba(255,255,255,.94)";ctx.shadowBlur=8;ctx.shadowColor="rgba(255,255,255,.55)";
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()
  }
  ctx.shadowBlur=0;
  for(const b of balls){
    for(let i=0;i<b.trail.length;i++){
      const t=b.trail[i];ctx.beginPath();ctx.fillStyle=hexA(colors[b.team],(i+1)/b.trail.length*.16);
      ctx.arc(t.x,t.y,b.r*(i+1)/b.trail.length,0,Math.PI*2);ctx.fill()
    }
    ctx.beginPath();ctx.fillStyle=colors[b.team];ctx.shadowBlur=16;ctx.shadowColor=colors[b.team];
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.beginPath();ctx.fillStyle="rgba(255,255,255,.72)";ctx.arc(b.x-b.r*.3,b.y-b.r*.35,b.r*.25,0,Math.PI*2);ctx.fill()
  }
}
function loop(now){
  const dt=Math.min(2,(now-last)/16.67);last=now;
  for(const b of balls)if(b.alive)physics(b,dt);
  balls=balls.filter(b=>b.alive&&b.y<H+30);draw();requestAnimationFrame(loop)
}
function hexA(hex,a){let n=parseInt(hex.slice(1),16);return`rgba(${n>>16},${n>>8&255},${n&255},${a})`}
function feed(text){const f=document.getElementById("feed");f.innerHTML=`<div class="feed-line">${text}</div>`}
function updateGoal(){
  document.getElementById("goalNow").textContent=goal;
  document.getElementById("goalFill").style.width=Math.min(100,goal/goalMax*100)+"%";
  if(goal>=goalMax){feed("⭐ GIFT GOAL COMPLETED!");goal=0}
}
function checkWinner(){
  const limit=1500;
  if(scores.girls>=limit||scores.boys>=limit){
    const team=scores.girls>=limit?"girls":"boys";
    const win=document.getElementById("winner");
    document.getElementById("winnerTitle").textContent=team.toUpperCase()+" WIN!";
    document.getElementById("winnerTitle").style.color=colors[team];
    document.getElementById("winnerText").textContent=`${scores.girls.toLocaleString()} — ${scores.boys.toLocaleString()}`;
    win.classList.add("show");
    setTimeout(()=>{win.classList.remove("show");round++;document.getElementById("round").textContent=round;scores={girls:0,boys:0};scoreEls.girls.textContent=0;scoreEls.boys.textContent=0;balls=[]},3500)
  }
}
function toggleAuto(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;document.getElementById("auto").textContent="AUTO DEMO";return}
  document.getElementById("auto").textContent="STOP AUTO";
  autoTimer=setInterval(()=>{
    const team=Math.random()<.5?"girls":"boys";
    const roll=Math.random(),v=roll<.65?1:roll<.92?10:100;
    spawn(team,v)
  },900+Math.random()*500)
}
function startLive(){live=true;document.getElementById("setup").classList.add("hidden");document.getElementById("liveMode").classList.add("show");if(!autoTimer)toggleAuto()}
function stopLive(){live=false;document.getElementById("setup").classList.remove("hidden");document.getElementById("liveMode").classList.remove("show")}
document.querySelectorAll("[data-team]").forEach(b=>b.onclick=()=>spawn(b.dataset.team,+b.dataset.value));
document.getElementById("girlBig").onclick=()=>spawn("girls",100);
document.getElementById("boyBig").onclick=()=>spawn("boys",100);
document.getElementById("auto").onclick=toggleAuto;
document.getElementById("startLive").onclick=startLive;
document.getElementById("secret").onpointerup=()=>{taps++;clearTimeout(tapTimer);tapTimer=setTimeout(()=>taps=0,700);if(taps>=3){taps=0;live?stopLive():startLive()}};
resize();addEventListener("resize",resize);requestAnimationFrame(loop)
})();
</script>
</body>
</html>
