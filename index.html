<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050301">
<title>The Book of Destiny</title>
<style>
  :root{
    --gold:#f4c56b;
    --ink:#2a1308;
  }
  *{box-sizing:border-box}
  html,body{
    width:100%;height:100%;margin:0;overflow:hidden;background:#000;
    font-family:Georgia,"Times New Roman",serif;
  }
  #app{
    position:relative;
    width:100vw;height:100vh;
    background:
      linear-gradient(to bottom,rgba(0,0,0,.12),rgba(0,0,0,.05) 55%,rgba(0,0,0,.42)),
      url("background.jpg") center center/cover no-repeat;
  }

  /* subtle cinematic movement */
  #app::before{
    content:"";
    position:absolute;inset:-3%;
    background:inherit;
    filter:saturate(1.04);
    animation:breathe 9s ease-in-out infinite alternate;
    pointer-events:none;
  }
  @keyframes breathe{
    from{transform:scale(1.00)}
    to{transform:scale(1.025)}
  }

  .top{
    position:absolute;z-index:3;top:3.2%;left:50%;transform:translateX(-50%);
    width:92%;text-align:center;color:#f8d993;text-shadow:0 2px 10px #000,0 0 22px #000;
  }
  .top h1{
    margin:0;font-size:clamp(27px,7vw,58px);letter-spacing:.06em;
    line-height:.95;
  }
  .top p{
    margin:.55rem 0 0;font-size:clamp(14px,3.2vw,23px);
    color:#fff1c8;letter-spacing:.04em;
  }

  .instruction{
    position:absolute;z-index:3;bottom:4.2%;left:50%;transform:translateX(-50%);
    width:88%;padding:.72rem 1rem;text-align:center;
    color:#ffe6aa;background:rgba(0,0,0,.58);
    border:1px solid rgba(244,197,107,.55);border-radius:999px;
    font-size:clamp(14px,3.6vw,22px);letter-spacing:.03em;
    backdrop-filter:blur(6px);
    box-shadow:0 6px 30px rgba(0,0,0,.45);
  }

  /* covers the static generated name, then displays the live name */
  .name-stage{
    position:absolute;z-index:4;
    left:52.5%;top:56.2%;
    width:41%;height:12%;
    transform:rotate(-3deg);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    border-radius:10px;
    background:
      radial-gradient(ellipse at center,rgba(213,172,102,.96),rgba(170,121,59,.94));
    box-shadow:inset 0 0 18px rgba(70,30,6,.28);
  }
  #name{
    width:100%;padding:0 .35rem;text-align:center;white-space:nowrap;
    color:var(--ink);
    font-family:"Brush Script MT","Segoe Script","Snell Roundhand",cursive;
    font-size:clamp(34px,8.5vw,76px);
    line-height:1;
    text-shadow:0 1px 0 rgba(255,255,255,.2);
    opacity:0;
  }
  #name.writing{
    opacity:1;
    animation:reveal 2.6s steps(26,end), glow 2.6s ease-out;
  }
  @keyframes reveal{
    from{clip-path:inset(0 100% 0 0)}
    to{clip-path:inset(0 0 0 0)}
  }
  @keyframes glow{
    0%,80%{filter:none}
    92%{filter:drop-shadow(0 0 10px #ffd36f)}
    100%{filter:none}
  }

  .spark{
    position:absolute;z-index:5;left:76%;top:62%;
    width:10px;height:10px;border-radius:50%;
    background:#fff6bc;box-shadow:0 0 10px #ffd36f,0 0 25px #ff8d20;
    opacity:0;
  }
  .spark.play{
    animation:spark 2.6s linear;
  }
  @keyframes spark{
    0%{opacity:0;transform:translateX(-150px) scale(.5)}
    12%{opacity:1}
    85%{opacity:1;transform:translateX(0) scale(1.2)}
    100%{opacity:0;transform:translateX(15px) scale(0)}
  }

  .status{
    position:absolute;z-index:9;left:10px;bottom:10px;
    color:rgba(255,255,255,.12);font:11px Arial,sans-serif;
    user-select:none;pointer-events:none;
  }

  /* hidden buffer: physical keyboard only */
  #secret{
    position:fixed;left:-10000px;top:-10000px;
    opacity:0;width:1px;height:1px;
  }

  .flash{
    position:absolute;inset:0;z-index:8;pointer-events:none;opacity:0;
    background:radial-gradient(circle at 65% 60%,rgba(255,195,80,.30),transparent 38%);
  }
  .flash.play{animation:flash .75s ease-out}
  @keyframes flash{0%{opacity:0}35%{opacity:1}100%{opacity:0}}

  @media (orientation:landscape){
    #app{width:56.25vh;height:100vh;margin:auto}
  }
</style>
</head>
<body>
<div id="app" tabindex="0">
  <div class="top">
    <h1>THE BOOK OF DESTINY</h1>
    <p>Comment your name. The book chooses who is remembered.</p>
  </div>

  <div class="name-stage"><div id="name">Salar</div></div>
  <div id="spark" class="spark"></div>
  <div id="flash" class="flash"></div>

  <div class="instruction">✦ Comment your name to enter the eternal book ✦</div>
  <div class="status">keyboard ready</div>
  <input id="secret" autocomplete="off" autocapitalize="words" spellcheck="false">
</div>

<script>
(() => {
  const secret = document.getElementById("secret");
  const nameEl = document.getElementById("name");
  const spark = document.getElementById("spark");
  const flash = document.getElementById("flash");
  let buffer = "";
  let busy = false;

  function focusSecret(){
    secret.focus({preventScroll:true});
  }

  function writeName(raw){
    const clean = raw.trim().replace(/\s+/g," ").slice(0,22);
    if(!clean || busy) return;
    busy = true;

    nameEl.classList.remove("writing");
    spark.classList.remove("play");
    flash.classList.remove("play");
    void nameEl.offsetWidth;

    nameEl.textContent = clean;
    nameEl.classList.add("writing");
    spark.classList.add("play");
    flash.classList.add("play");

    if(navigator.vibrate) navigator.vibrate(30);

    setTimeout(() => {
      busy = false;
      buffer = "";
      secret.value = "";
      focusSecret();
    }, 2850);
  }

  // Physical keyboard workflow:
  // Type any name anywhere. Press Enter. Nothing typed appears on screen.
  window.addEventListener("keydown", (e) => {
    if(e.metaKey || e.ctrlKey || e.altKey) return;

    if(e.key === "Enter"){
      e.preventDefault();
      writeName(buffer);
      return;
    }
    if(e.key === "Escape"){
      buffer = "";
      secret.value = "";
      return;
    }
    if(e.key === "Backspace"){
      e.preventDefault();
      buffer = buffer.slice(0,-1);
      return;
    }
    if(e.key.length === 1 && buffer.length < 22){
      e.preventDefault();
      buffer += e.key;
    }
  }, true);

  // Tap once after opening page so Safari accepts keyboard focus.
  document.getElementById("app").addEventListener("click", focusSecret);
  window.addEventListener("load", focusSecret);
})();
</script>
</body>
</html>
