<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#050302" />
<title>The Book of Destiny</title>
<style>
:root{
  --gold:#efc568;
  --gold-dark:#8b5717;
  --paper:#e7c27e;
  --paper-edge:#9c622d;
  --ink:#291207;
  --panel:#070402;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:Georgia,"Times New Roman",serif}
body{display:grid;place-items:center}
button,input{font:inherit}
#app{
  position:relative;
  width:min(100vw,56.25dvh);
  height:min(100dvh,177.777vw);
  overflow:hidden;
  isolation:isolate;
  background:
    radial-gradient(circle at 15% 48%,rgba(255,101,23,.22),transparent 20%),
    radial-gradient(circle at 82% 34%,rgba(246,169,58,.12),transparent 15%),
    linear-gradient(#090503 0%,#160b07 48%,#030202 100%);
}
#app::after{content:"";position:absolute;inset:0;z-index:60;pointer-events:none;box-shadow:inset 0 0 90px rgba(0,0,0,.78)}
.shelf{position:absolute;top:14%;width:28%;height:50%;opacity:.43;border:7px solid #150a05;background:repeating-linear-gradient(0deg,#0a0503 0 8%,#2d160b 8% 10%),repeating-linear-gradient(90deg,#2a1309 0 9%,#120805 9% 15%)}
.shelf.left{left:-9%;transform:perspective(450px) rotateY(14deg)}
.shelf.right{right:-9%;transform:perspective(450px) rotateY(-14deg)}
.fireplace{position:absolute;left:1%;top:41%;width:27%;height:26%;border:12px solid #27130a;border-bottom:0;border-radius:48% 48% 0 0;background:radial-gradient(ellipse at 50% 98%,#fff4a5 0 7%,#fa8521 8% 20%,#8a220b 29%,#100503 67%);box-shadow:0 0 60px rgba(255,88,18,.27),inset 0 0 26px #000}
.flame,.flame::before,.flame::after{content:"";position:absolute;left:42%;bottom:6%;width:18%;height:45%;border-radius:50% 50% 42% 42%;background:linear-gradient(#fff9af,#ff9b28 48%,#a8230a);transform-origin:50% 100%;animation:flicker .58s ease-in-out infinite alternate}
.flame::before{left:-94%;bottom:-3%;width:112%;height:78%;animation-delay:-.23s}
.flame::after{left:78%;bottom:-5%;width:92%;height:70%;animation-delay:-.39s}
@keyframes flicker{from{transform:rotate(-4deg) scale(.9);opacity:.7}to{transform:rotate(5deg) scale(1.08);opacity:1}}
.header{position:absolute;z-index:12;top:3.2%;left:5%;right:5%;text-align:center;text-shadow:0 3px 13px #000,0 0 25px #000}
.header h1{margin:0;color:var(--gold);font-size:clamp(29px,8vw,64px);line-height:.92;letter-spacing:.03em}
.header p{margin:10px auto 0;color:#fff2d4;font-size:clamp(14px,3.3vw,23px);line-height:1.18;max-width:92%}
.desk{position:absolute;left:0;right:0;bottom:0;height:23%;background:repeating-linear-gradient(90deg,#241006 0 50px,#4b2510 52px 100px,#1d0c05 102px 160px);border-top:8px solid #120704;box-shadow:0 -20px 65px rgba(0,0,0,.78)}
.stage{position:absolute;z-index:6;left:50%;top:55.5%;width:94%;aspect-ratio:1.48;transform:translate(-50%,-50%);perspective:1100px;filter:drop-shadow(0 24px 20px rgba(0,0,0,.78))}
.book{position:absolute;inset:0;display:flex;transform:rotateX(8deg)}
.cover{position:absolute;inset:4% 0 -4%;border-radius:8% 8% 10% 10%;background:linear-gradient(105deg,#281006,#713718 48%,#301407);border:7px solid #160803;box-shadow:inset 0 0 34px #080301}
.page{position:relative;z-index:2;width:50%;height:94%;top:1%;overflow:hidden;border:4px solid #603515;background:radial-gradient(circle at 50% 42%,rgba(255,241,188,.84),transparent 44%),repeating-linear-gradient(0deg,rgba(86,42,12,.018) 0 1px,transparent 1px 4px),linear-gradient(100deg,var(--paper-edge),var(--paper) 18%,#e6bd75 83%,#9d622e);box-shadow:inset 0 0 24px rgba(61,25,7,.38)}
.page.left{border-radius:8% 1% 3% 10%;transform:rotateY(5deg);transform-origin:right}
.page.right{border-radius:1% 8% 10% 3%;transform:rotateY(-5deg);transform-origin:left}
.page::before{content:"";position:absolute;inset:6%;border:2px solid rgba(73,35,10,.47);border-radius:3%;box-shadow:inset 0 0 0 4px rgba(133,76,25,.11)}
.orn{position:absolute;color:rgba(74,34,8,.45);font-size:clamp(20px,4.7vw,46px)}
.orn.tl{left:8%;top:7%}.orn.br{right:8%;bottom:8%;transform:rotate(180deg)}
.copy{position:absolute;left:14%;right:14%;top:35%;text-align:center;color:#4c250c;font-style:italic;font-weight:bold;font-size:clamp(13px,3.1vw,27px);line-height:1.24}
#inkCanvas{position:absolute;z-index:7;left:53.4%;top:34.5%;width:38.6%;height:29%;transform:rotate(-1.2deg)}
#quill{position:absolute;z-index:10;left:61%;top:50%;width:13%;aspect-ratio:.48;transform:translate(-50%,-83%) rotate(17deg);transform-origin:53% 87%;filter:drop-shadow(0 8px 6px rgba(0,0,0,.65));will-change:left,top,transform}
.feather{position:absolute;left:22%;top:0;width:58%;height:79%;background:linear-gradient(100deg,#090706,#3a291d 29%,#0d0a08 55%,#95662f 74%,#100c09);clip-path:polygon(48% 0,68% 13%,78% 36%,66% 68%,48% 100%,35% 70%,15% 48%,25% 21%)}
.feather::after{content:"";position:absolute;left:49%;top:5%;width:3%;height:91%;background:#d7a75a;transform:rotate(-3deg)}
.shaft{position:absolute;left:49%;top:68%;width:6%;height:34%;background:linear-gradient(90deg,#68401b,#edbf65,#603918);transform:rotate(4deg);border-radius:50%}
.tip{position:absolute;left:45%;bottom:-2%;width:16%;height:12%;background:#c39040;clip-path:polygon(50% 100%,0 0,100% 0)}
.spark{position:absolute;z-index:11;width:6px;height:6px;border-radius:50%;opacity:0;background:#fffbd1;box-shadow:0 0 8px #ffe16c,0 0 20px #ff8c1f;pointer-events:none}
.pageflip{position:absolute;z-index:12;left:50%;top:1%;width:50%;height:94%;transform-origin:left center;transform:rotateY(90deg);opacity:0;border:4px solid #603515;border-radius:1% 8% 10% 3%;background:linear-gradient(100deg,#9f6330,#e3b971 20%,#d8a95e 86%,#7b421d)}
.pageflip.go{animation:flip 1.15s cubic-bezier(.4,.05,.2,1) forwards}
@keyframes flip{0%{opacity:1;transform:rotateY(0)}48%{box-shadow:-24px 8px 28px rgba(0,0,0,.42);transform:rotateY(-88deg)}100%{opacity:1;transform:rotateY(-180deg)}}
#fx{position:absolute;inset:0;z-index:8;pointer-events:none}
#panel{position:absolute;z-index:30;left:50%;bottom:3%;transform:translateX(-50%);width:92%;display:flex;gap:7px;padding:9px;border:1px solid rgba(239,195,95,.72);border-radius:15px;background:rgba(4,2,1,.94);backdrop-filter:blur(8px);box-shadow:0 12px 32px rgba(0,0,0,.62)}
#panel.hidden{display:none}
#nameInput,#writeBtn,#liveBtn{height:47px;border:0;border-radius:9px;font-size:15px}
#nameInput{flex:1;min-width:0;padding:0 12px;background:#fff0cb;color:#241004}
#writeBtn,#liveBtn{padding:0 12px;color:#fff7dd;font-weight:bold;background:linear-gradient(#d3a03a,#83510f)}
#liveBtn{background:linear-gradient(#922619,#51100b)}
#hint{position:absolute;z-index:31;left:50%;bottom:.8%;transform:translateX(-50%);color:rgba(255,255,255,.5);font:10px Arial,sans-serif;white-space:nowrap}
#hint.hidden{display:none}
#secretCorner{position:absolute;z-index:40;right:0;bottom:0;width:78px;height:78px}
@media (prefers-reduced-motion:reduce){.flame,.flame::before,.flame::after{animation-duration:1.3s}.pageflip.go{animation-duration:.8s}}
</style>
</head>
<body>
<div id="app" tabindex="0">
  <div class="shelf left"></div><div class="shelf right"></div>
  <div class="fireplace"><div class="flame"></div></div>
  <header class="header"><h1>THE BOOK<br>OF DESTINY</h1><p>Comment your name. The book chooses who is remembered.</p></header>
  <div class="stage" id="stage">
    <div class="book">
      <div class="cover"></div>
      <div class="page left"><span class="orn tl">❦</span><span class="orn br">❦</span><div class="copy">Every name written here<br>becomes part of legend…</div></div>
      <div class="page right"><span class="orn tl">❦</span><span class="orn br">❦</span></div>
      <div class="pageflip" id="pageflip"></div>
    </div>
    <canvas id="inkCanvas"></canvas>
    <div id="quill"><div class="feather"></div><div class="shaft"></div><div class="tip"></div></div>
    <div class="spark" id="spark"></div>
  </div>
  <canvas id="fx"></canvas>
  <div class="desk"></div>
  <div id="panel"><input id="nameInput" maxlength="30" placeholder="Type a viewer's name" autocomplete="off"><button id="writeBtn">WRITE</button><button id="liveBtn">START LIVE</button></div>
  <div id="hint">Test a name first, then press START LIVE</div>
  <div id="secretCorner" aria-hidden="true"></div>
</div>
<script>
(() => {
  const app=document.getElementById('app');
  const stage=document.getElementById('stage');
  const ink=document.getElementById('inkCanvas');
  const ictx=ink.getContext('2d');
  const off=document.createElement('canvas');
  const octx=off.getContext('2d');
  const fx=document.getElementById('fx');
  const fctx=fx.getContext('2d');
  const quill=document.getElementById('quill');
  const spark=document.getElementById('spark');
  const flip=document.getElementById('pageflip');
  const panel=document.getElementById('panel');
  const input=document.getElementById('nameInput');
  const hint=document.getElementById('hint');
  const secret=document.getElementById('secretCorner');

  let liveMode=false,busy=false,buffer='',tapCount=0,tapTimer=null,particles=[];

  function setupCanvas(){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=ink.getBoundingClientRect();
    ink.width=Math.max(1,Math.round(r.width*dpr));
    ink.height=Math.max(1,Math.round(r.height*dpr));
    off.width=ink.width;off.height=ink.height;
    ictx.setTransform(dpr,0,0,dpr,0,0);
    octx.setTransform(dpr,0,0,dpr,0,0);
    const ar=app.getBoundingClientRect();
    fx.width=Math.round(ar.width*dpr);fx.height=Math.round(ar.height*dpr);
    fx.style.width=ar.width+'px';fx.style.height=ar.height+'px';
    fctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function getInkSize(){const dpr=Math.min(window.devicePixelRatio||1,2);return {w:ink.width/dpr,h:ink.height/dpr}}

  function fitFont(text,w){
    let size=Math.min(62,w*.18);
    const family='"Snell Roundhand","Brush Script MT","Segoe Script",cursive';
    while(size>22){octx.font=`italic ${size}px ${family}`;if(octx.measureText(text).width<=w*.9)break;size-=2}
    return {size,family};
  }

  function renderName(text){
    const {w,h}=getInkSize();
    octx.clearRect(0,0,w,h);
    const {size,family}=fitFont(text,w);
    octx.font=`italic ${size}px ${family}`;octx.textAlign='center';octx.textBaseline='middle';
    octx.lineWidth=Math.max(1,size*.025);octx.strokeStyle='#2b1307';octx.fillStyle='#2b1307';
    octx.shadowColor='rgba(255,201,80,.15)';octx.shadowBlur=2;
    octx.strokeText(text,w/2,h/2);octx.fillText(text,w/2,h/2);
    const m=octx.measureText(text);
    return {w,h,left:(w-m.width)/2,right:(w+m.width)/2};
  }

  function drawProgress(meta,p){
    ictx.clearRect(0,0,meta.w,meta.h);
    const x=Math.max(0,meta.left+(meta.right-meta.left)*p);
    ictx.save();ictx.beginPath();ictx.rect(0,0,x,meta.h);ictx.clip();ictx.drawImage(off,0,0,meta.w,meta.h);ictx.restore();
    const ir=ink.getBoundingClientRect(),sr=stage.getBoundingClientRect();
    const localX=(ir.left-sr.left)+(x/meta.w)*ir.width;
    const localY=(ir.top-sr.top)+ir.height*.58;
    quill.style.left=(localX/sr.width*100)+'%';quill.style.top=(localY/sr.height*100)+'%';
    quill.style.transform=`translate(-50%,-83%) rotate(${16+Math.sin(p*18)*2.2}deg)`;
    spark.style.left=(localX/sr.width*100)+'%';spark.style.top=((localY+ir.height*.08)/sr.height*100)+'%';spark.style.opacity=p>0&&p<1?1:0;
  }

  function burst(){const ar=app.getBoundingClientRect();for(let i=0;i<34;i++)particles.push({x:ar.width*.68+(Math.random()-.5)*100,y:ar.height*.53+(Math.random()-.5)*55,vx:(Math.random()-.5)*1.5,vy:-.5-Math.random()*1.6,life:35+Math.random()*42,r:1+Math.random()*2.4})}
  function animateParticles(){const ar=app.getBoundingClientRect();fctx.clearRect(0,0,ar.width,ar.height);particles=particles.filter(p=>p.life>0);for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--;const a=Math.max(0,p.life/70);fctx.beginPath();fctx.fillStyle=`rgba(255,204,83,${a})`;fctx.shadowBlur=11;fctx.shadowColor='#ffae25';fctx.arc(p.x,p.y,p.r,0,Math.PI*2);fctx.fill()}requestAnimationFrame(animateParticles)}

  function writeName(raw){
    const text=String(raw||'').trim().replace(/\s+/g,' ').slice(0,30);
    if(!text||busy)return;
    busy=true;buffer='';input.value='';flip.classList.remove('go');setupCanvas();
    const meta=renderName(text);const duration=Math.max(1900,Math.min(4800,1450+[...text].length*150));const start=performance.now();burst();
    function frame(now){const p=Math.min(1,(now-start)/duration);const eased=1-Math.pow(1-p,2.25);drawProgress(meta,eased);if(p<1)requestAnimationFrame(frame);else{spark.style.opacity=0;burst();setTimeout(()=>flip.classList.add('go'),1500);setTimeout(()=>{const {w,h}=getInkSize();ictx.clearRect(0,0,w,h);flip.classList.remove('go');quill.style.left='61%';quill.style.top='50%';quill.style.transform='translate(-50%,-83%) rotate(17deg)';busy=false;if(!liveMode)input.focus()},2900)}}
    requestAnimationFrame(frame);
  }

  function startLive(){liveMode=true;panel.classList.add('hidden');hint.classList.add('hidden');input.blur();app.focus();buffer=''}
  function stopLive(){liveMode=false;panel.classList.remove('hidden');hint.classList.remove('hidden');buffer='';setTimeout(()=>input.focus(),50)}

  document.getElementById('writeBtn').onclick=()=>writeName(input.value);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();writeName(input.value)}});
  document.getElementById('liveBtn').onclick=startLive;
  document.addEventListener('keydown',e=>{if(!liveMode)return;if(e.metaKey||e.ctrlKey||e.altKey)return;if(e.key==='Enter'){e.preventDefault();writeName(buffer)}else if(e.key==='Backspace'){e.preventDefault();buffer=buffer.slice(0,-1)}else if(e.key==='Escape'){buffer=''}else if(e.key.length===1&&buffer.length<30){e.preventDefault();buffer+=e.key}},true);
  secret.addEventListener('pointerup',()=>{tapCount++;clearTimeout(tapTimer);tapTimer=setTimeout(()=>tapCount=0,750);if(tapCount>=3){tapCount=0;clearTimeout(tapTimer);liveMode?stopLive():startLive()}});

  window.addEventListener('resize',()=>{if(!busy)setupCanvas()});
  setupCanvas();animateParticles();input.focus();
})();
</script>
</body>
</html>
