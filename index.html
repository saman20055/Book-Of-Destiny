<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>The Book of Destiny</title>
<style>
:root{--gold:#e9b74e;--cream:#ffecc2;--ink:#2a1407}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:Georgia,serif}
#app{
  position:relative;width:100vw;height:100vh;overflow:hidden;
  background:url("background.jpg") center/cover no-repeat;
}
.title{
  position:absolute;left:5%;right:5%;top:4%;text-align:center;color:var(--gold);
  text-shadow:0 3px 14px #000,0 0 30px #000;
}
.title h1{margin:0;font-size:clamp(36px,8.8vw,74px);line-height:.95;letter-spacing:.04em}
.title p{margin:14px 0 0;color:#fff4dc;font-size:clamp(16px,3.8vw,27px)}

#name{
  position:absolute;
  left:52.5%;top:47.3%;
  width:38%;height:11%;
  display:flex;align-items:center;justify-content:center;
  padding:0 .25rem;
  text-align:center;white-space:nowrap;
  color:var(--ink);
  font-family:"Brush Script MT","Segoe Script","Snell Roundhand",cursive;
  font-size:clamp(37px,8vw,76px);
  transform:rotate(-1.8deg);
  opacity:0;
}
#name.write{opacity:1;animation:reveal 2.4s steps(24,end),glow 2.6s ease-out}
@keyframes reveal{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}
@keyframes glow{0%,78%{filter:none}91%{filter:drop-shadow(0 0 12px #ffd36a)}100%{filter:none}}

#panel{
  position:absolute;left:50%;bottom:5%;transform:translateX(-50%);
  width:min(92%,680px);
  display:flex;gap:9px;padding:11px;
  background:rgba(3,2,1,.9);
  border:1px solid rgba(233,183,78,.75);
  border-radius:16px;backdrop-filter:blur(8px);
}
#panel.hidden{display:none}
input,button{height:52px;border:0;border-radius:10px;font-size:18px}
input{flex:1;min-width:0;padding:0 15px;background:#fff2d1;color:#241104}
button{padding:0 16px;color:#fff8df;font-weight:700;background:linear-gradient(#d8a943,#81510f)}
#showZone{position:absolute;right:0;bottom:0;width:65px;height:65px}
.note{
  position:absolute;left:50%;bottom:1.4%;transform:translateX(-50%);
  color:rgba(255,255,255,.58);font:12px Arial,sans-serif;white-space:nowrap
}
#flash{position:absolute;inset:0;pointer-events:none;opacity:0;background:radial-gradient(circle at 68% 54%,rgba(255,206,96,.32),transparent 32%)}
#flash.go{animation:flash .8s ease-out}
@keyframes flash{0%{opacity:0}35%{opacity:1}100%{opacity:0}}
@media(orientation:landscape){#app{width:56.25vh;height:100vh;margin:auto}}
</style>
</head>
<body>
<div id="app">
  <div class="title">
    <h1>THE BOOK OF DESTINY</h1>
    <p>Comment your name. The book chooses who is remembered.</p>
  </div>

  <div id="name"></div>
  <div id="flash"></div>

  <div id="panel">
    <input id="viewerName" maxlength="22" placeholder="Type a viewer's name">
    <button id="write">WRITE</button>
    <button id="hide">HIDE</button>
  </div>

  <div id="showZone"></div>
  <div class="note">Tap the bottom-right corner to show controls again</div>
</div>

<script>
const input=document.getElementById("viewerName");
const nameEl=document.getElementById("name");
const flash=document.getElementById("flash");
const panel=document.getElementById("panel");
let busy=false;

function writeName(){
  const value=input.value.trim().replace(/\s+/g," ").slice(0,22);
  if(!value||busy)return;
  busy=true;

  nameEl.classList.remove("write");
  flash.classList.remove("go");
  void nameEl.offsetWidth;

  nameEl.textContent=value;
  nameEl.classList.add("write");
  flash.classList.add("go");

  input.value="";
  setTimeout(()=>{busy=false;input.focus()},2700);
}

document.getElementById("write").onclick=writeName;
input.addEventListener("keydown",e=>{
  if(e.key==="Enter"){e.preventDefault();writeName()}
});
document.getElementById("hide").onclick=()=>panel.classList.add("hidden");
document.getElementById("showZone").onclick=()=>{
  panel.classList.remove("hidden");
  input.focus();
};
window.addEventListener("load",()=>input.focus());
</script>
</body>
</html>
